name: Build v2ray

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-20.04
    env: 
      DOCKER_REPOSITORY_NAME: sh777
      DOCKER_IMAGE_NAME: v2ray
      DOCKER_TAG_PREFIX: 1.0.

    steps:
      - name: Checkout
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5  # v2

      - name: Login Docker Registry
        uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7  # v1
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - uses: docker/setup-buildx-action@v1
        id: buildx
        with:
          install: true

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@b2391d37b4157fa4aa2e118d643f417910ff3242  # v3
        with:
          images: ${{env.DOCKER_REPOSITORY_NAME}}/${{env.DOCKER_IMAGE_NAME}}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,${{ steps.extract-tag.outputs.result }}
          flavor: |
            latest=true
            prefix=${{ env.DOCKER_TAG_PREFIX }}          

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@ac9327eae2b366085ac7f6a2d02df8aa8ead720a  # v2
        with:
          push: true
          file: ./v2ray/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ steps.meta.outputs.images }}:latest
          cache-to: type=inline
